name: airchat_flutter
description: AirChat — YouTube/Twitch/Kick chat viewer for streamers, with OBS overlay server.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # HTTP / WebSocket
  http: ^1.2.0
  web_socket_channel: ^3.0.0

  # OBS overlay server
  shelf: ^1.4.0
  shelf_web_socket: ^2.0.0
  network_info_plus: ^6.0.0

  # Images (GIF + WebP animated)
  cached_network_image: ^3.4.0
  extended_image: ^9.0.0

  # TTS (Supertonic ONNX)
  flutter_onnxruntime: ^1.6.0
  media_kit: ^1.2.6
  media_kit_libs_audio: ^1.0.7
  path_provider: ^2.1.1
  logger: ^2.0.2

  # Persistence
  shared_preferences: ^2.3.0

  # State management
  flutter_riverpod: ^2.6.0

  # Window management (drag, minimize, maximize, frameless — for A/B testing vs our Win32 impl)
  window_manager: ^0.4.0

  # Window visual effects: transparent, acrylic, mica, blur (Windows/macOS/Linux)
  flutter_acrylic: ^1.1.0

  # OBS integration
  obs_websocket: ^5.7.0+3

  # Window control (click-through, anti-capture)
  air_window_control:
    git:
      url: git@github.com:DiegPS/air_window_control.git
      ref: main

  # Chat clients
  dart_youtube_chat:
    git:
      url: git@github.com:DiegPS/dart_youtube_chat.git
      ref: main
  dart_kick_chat:
    git:
      url: git@github.com:DiegPS/dart_kick_chat.git
      ref: main

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
